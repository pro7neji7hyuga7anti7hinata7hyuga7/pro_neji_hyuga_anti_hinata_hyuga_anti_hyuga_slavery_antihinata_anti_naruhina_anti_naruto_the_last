<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neji Hyuga Gallery</title>
<style>
body { font-family: Arial; background:#f0f0f0; margin:0; padding:0; }
header { text-align:center; background:#222; color:white; padding:1rem 0; }
.gallery { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:10px; padding:10px; }
.gallery img { width:100%; border-radius:10px; cursor:pointer; transition:0.2s; }
.gallery img:hover { transform:scale(1.05); }
.album-title { margin:20px 0 10px 10px; font-size:1.2rem; font-weight:bold; }
</style>
</head>
<body>
<header>
<h1>Neji Hyuga Gallery</h1>
<p>Honouring the genius of Neji Hyuga</p>
</header>

<h2 class="album-title">Album 1</h2>
<div class="gallery">
  <img src="https://via.placeholder.com/200" alt="Sample Image 1">
  <img src="https://via.placeholder.com/200" alt="Sample Image 2">
  <img src="https://via.placeholder.com/200" alt="Sample Image 3">
</div>

</body>
</html>
